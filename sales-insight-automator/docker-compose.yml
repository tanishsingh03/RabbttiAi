version: "3.9"

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: sia-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
    env_file:
      - .env.example   # swap to .env once you add real secrets
    volumes:
      # Mount source for hot-reload during local development
      - ./backend:/app
      - /app/node_modules  # prevent host node_modules from overriding container
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

